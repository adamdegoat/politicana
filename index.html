<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--above-hud:62px;--stage-bottom:96px}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Plus Jakarta Sans',sans-serif;background:#020617}
/* #viewport is the ONLY horizontal scroll container (mobile turns on overflow-x:auto inside
   the @media(max-width:768px) block below so the wider-than-screen yacht can be swiped
   bow→stern; desktop stays overflow:hidden). The body itself never scrolls, so the
   position:fixed HUD overlays (all body-level, OUTSIDE #viewport) stay rock-solid. */
#viewport{position:relative;width:100vw;height:calc(100vh - var(--stage-bottom));overflow:hidden}
/* World renders ABOVE the fixed bottom bars (HUD + collapsed feed drawer) so the
   beach + ocean band are never hidden behind them. --stage-bottom is measured live.
   #world is the (on mobile, wider-than-viewport) scene content inside #viewport. */
#world{position:relative;width:100%;height:100%;overflow:visible}
#world-svg{position:absolute;inset:0;width:100%;height:100%;z-index:0;transform:translateY(calc(-1 * var(--world-shift,0px)))}
#stars{position:absolute;inset:0;width:100%;height:34%;pointer-events:none;z-index:2;opacity:0;transition:opacity 3s}
#world.night #stars,#world.dawn #stars{opacity:1}

/* Cloud animations */
@keyframes cloud-a{from{transform:translateX(0)}to{transform:translateX(1300px)}}
.cl1{animation:cloud-a 90s linear infinite}
.cl2{animation:cloud-a 115s linear infinite;animation-delay:-40s}
.cl3{animation:cloud-a 72s linear infinite;animation-delay:-22s}

/* Fire animations */
@keyframes flk{0%,100%{transform:scaleY(1) scaleX(1)}50%{transform:scaleY(1.22) scaleX(.9)}}
.fa{animation:flk .75s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 100%}
.fb{animation:flk .55s ease-in-out infinite reverse;transform-box:fill-box;transform-origin:50% 100%}
.fc{animation:flk .42s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 100%}

/* Wave animations */
@keyframes wv{from{transform:translateX(0)}to{transform:translateX(500px)}}
.wa{animation:wv 13s linear infinite}
.wb{animation:wv 19s linear infinite reverse}
/* Gentle palm sway — pivots at each palm's crown (origin set inline, in viewBox units) */
@keyframes palmsway{0%,100%{transform:rotate(-1.4deg)}50%{transform:rotate(1.4deg)}}
.palm-sway{transform-box:view-box;animation:palmsway 5.5s ease-in-out infinite}
/* Ambient birds drift slowly across the sky */
@keyframes birddrift{0%{transform:translate(0,0)}50%{transform:translate(46px,-9px)}100%{transform:translate(0,0)}}
.birds-drift{transform-box:view-box;animation:birddrift 24s ease-in-out infinite}
/* Fireflies near the firepit (parent group's opacity gates night-only visibility) */
@keyframes firefly{0%,100%{opacity:0;transform:translate(0,0)}25%{opacity:.95}50%{opacity:.35;transform:translate(7px,-9px)}75%{opacity:.85}}
.firefly{transform-box:view-box;animation:firefly 4.2s ease-in-out infinite}
/* Dog (puppy) ears + tail — driven by applyDogExtras; smooth transitions + tail wag */
.dog-ear{transform-box:view-box;transition:transform .45s ease}
.dog-tail{transform-box:view-box;transition:transform .45s ease}
@keyframes tailwag{0%,100%{transform:rotate(-20deg)}50%{transform:rotate(20deg)}}
.dog-tail.wag{animation:tailwag .45s ease-in-out infinite}
.dog-tail.slow{animation:tailwag 1.5s ease-in-out infinite}

/* ══ ARCTIC AMBIENT MOTION (SVG, viewBox units) ══ */
/* Falling snow — each column drifts down + sideways, then loops. Distinct durations/delays
   per flake give a natural, non-synchronised flurry. transform-box:view-box so the dx/dy
   are in the 1000×600 viewBox space. */
@keyframes snowfall{
  0%{transform:translate(0,-30px);opacity:0}
  8%{opacity:.95}
  92%{opacity:.9}
  100%{transform:translate(34px,640px);opacity:0}}
@keyframes snowfall2{
  0%{transform:translate(0,-30px);opacity:0}
  10%{opacity:.85}
  90%{opacity:.8}
  100%{transform:translate(-28px,640px);opacity:0}}
.snow{transform-box:view-box}
.snow-a{animation:snowfall 9s linear infinite}
.snow-b{animation:snowfall2 13s linear infinite}
.snow-c{animation:snowfall 16s linear infinite}
/* Funnel steam — rises, expands, fades while curling sideways */
@keyframes steam{
  0%{transform:translate(0,0) scale(.7);opacity:0}
  18%{opacity:.55}
  60%{opacity:.32}
  100%{transform:translate(14px,-58px) scale(1.9);opacity:0}}
@keyframes steam2{
  0%{transform:translate(0,0) scale(.6);opacity:0}
  22%{opacity:.45}
  100%{transform:translate(-12px,-66px) scale(2.1);opacity:0}}
.steam{transform-box:view-box}
.steam-a{animation:steam 6.5s ease-out infinite}
.steam-b{animation:steam2 8.5s ease-out infinite;animation-delay:-3s}
.steam-c{animation:steam 7.5s ease-out infinite;animation-delay:-5s}
/* Aurora — gentle horizontal drift + slow opacity breath (the parent group's opacity
   gates night-only visibility; these animate the ribbons within it) */
@keyframes auroraDrift{0%{transform:translateX(0)}50%{transform:translateX(46px)}100%{transform:translateX(0)}}
@keyframes auroraDrift2{0%{transform:translateX(0)}50%{transform:translateX(-54px)}100%{transform:translateX(0)}}
@keyframes auroraBreath{0%,100%{opacity:.35}50%{opacity:.9}}
.aurora-rib{transform-box:view-box}
.aurora-a{animation:auroraDrift 26s ease-in-out infinite,auroraBreath 11s ease-in-out infinite}
.aurora-b{animation:auroraDrift2 34s ease-in-out infinite,auroraBreath 14s ease-in-out infinite;animation-delay:0s,-4s}
.aurora-c{animation:auroraDrift 30s ease-in-out infinite,auroraBreath 17s ease-in-out infinite;animation-delay:-8s,-9s}
/* Icicle shimmer + occasional drip */
@keyframes icicleShine{0%,100%{opacity:.55}50%{opacity:1}}
@keyframes drip{0%{transform:translateY(0);opacity:0}10%{opacity:.9}80%{opacity:.7}100%{transform:translateY(26px);opacity:0}}
.icicle{transform-box:view-box;animation:icicleShine 5s ease-in-out infinite}
.drip{transform-box:view-box;animation:drip 4.5s ease-in infinite}
/* Ice glints — sharp sparkle that pops then fades */
@keyframes glint{0%,72%,100%{opacity:0;transform:scale(.4)}82%{opacity:.95;transform:scale(1.1)}}
.glint{transform-box:view-box;animation:glint 6s ease-in-out infinite}
/* Cabin window warmth flicker (subtle — like a fire/lamp inside) */
@keyframes warmFlicker{0%,100%{opacity:1}30%{opacity:.86}55%{opacity:.97}78%{opacity:.9}}
.warm-win{animation:warmFlicker 3.4s ease-in-out infinite}
@keyframes glowBreath{0%,100%{opacity:.5}50%{opacity:.78}}
.glow-breath{animation:glowBreath 5.5s ease-in-out infinite}

/* SVG transitions */
#sky-bg,#sun-group,#moon-group,#night-stars,#night-overlay,#sun-reflection{transition:opacity 2.5s ease}

/* ── ATMOSPHERE OVERLAYS (pure CSS, no JS/engine) ── */
/* Vignette: darken the corners to draw the eye to the centre of the island */
#vignette{position:absolute;inset:0;z-index:6;pointer-events:none;
  background:radial-gradient(120% 95% at 50% 42%,transparent 58%,rgba(2,6,23,.16) 84%,rgba(2,6,23,.42) 100%)}
/* Time-of-day colour wash: a soft tint that shifts with the cycle for cohesion */
#color-wash{position:absolute;inset:0;z-index:7;pointer-events:none;opacity:0;
  mix-blend-mode:soft-light;transition:background 2.5s ease,opacity 2.5s ease}
#world.evening #color-wash{background:#fb923c;opacity:.5}
#world.morning #color-wash{background:#fdba74;opacity:.4}
#world.dawn    #color-wash{background:#f9a8d4;opacity:.45}
#world.night   #color-wash{background:#1e1b4b;opacity:.35}
#world.midday  #color-wash,#world.afternoon #color-wash{opacity:0}

/* ── DAY STAMP ── */
/* ── DAY HISTORY ── */
/* ── AUDIENCE VOTE PILL + PANEL ("sway, don't script") ── */
#vote-pill{position:fixed;top:22px;right:108px;z-index:35;display:flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:20px;cursor:pointer;white-space:nowrap;
  background:linear-gradient(135deg,rgba(251,191,36,.24),rgba(244,114,182,.2));
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(251,191,36,.5);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:800;letter-spacing:.4px;color:#fde68a;
  box-shadow:0 2px 14px rgba(0,0,0,.4);animation:votePulse 2.6s ease-in-out infinite;
  transition:transform .15s,border-color .2s}
#vote-pill:hover{transform:translateY(-1px);border-color:rgba(251,191,36,.85)}
#vote-pill.active{animation:none;background:linear-gradient(135deg,rgba(251,191,36,.42),rgba(244,114,182,.34));border-color:rgba(251,191,36,.9)}
@keyframes votePulse{0%,100%{box-shadow:0 2px 14px rgba(0,0,0,.4),0 0 0 0 rgba(251,191,36,.45)}
  50%{box-shadow:0 2px 14px rgba(0,0,0,.4),0 0 0 5px rgba(251,191,36,0)}}
#vote-pill .vp-dot{width:6px;height:6px;border-radius:50%;background:#fde68a;box-shadow:0 0 7px #fde68a}
/* dropdown panel — anchored under the pill (like the Days panel), warm gold "sway the yacht" palette */
#vote-panel{position:fixed;top:60px;right:108px;z-index:41;width:300px;max-width:calc(100vw - 24px);
  background:linear-gradient(180deg,rgba(26,16,34,.6),rgba(12,9,22,.66));
  backdrop-filter:blur(20px) saturate(1.2);-webkit-backdrop-filter:blur(20px) saturate(1.2);
  border:1px solid rgba(251,191,36,.34);border-radius:16px;
  box-shadow:0 20px 54px rgba(0,0,0,.6),0 0 26px rgba(251,191,36,.08);
  max-height:0;overflow:hidden;opacity:0;pointer-events:none;
  transition:max-height .34s cubic-bezier(.4,0,.2,1),opacity .22s ease}
#vote-panel::before{content:'';position:absolute;left:0;right:0;top:0;height:2px;z-index:3;
  background:linear-gradient(90deg,transparent,rgba(251,191,36,.7),rgba(244,114,182,.5),transparent)}
#vote-panel.open{max-height:80vh;opacity:1;pointer-events:auto;overflow-y:auto}
.vp-inner{padding:15px 16px 15px}
.vp-eyebrow{font-family:'VT323',monospace;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(251,191,36,.62);margin-bottom:3px}
.vp-head{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:16px;letter-spacing:.01em;line-height:1.1;
  background:linear-gradient(180deg,#fff8ea 0%,#fde68a 58%,#f59e0b 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
.vp-tag{font-size:10.5px;color:rgba(255,255,255,.5);font-style:italic;margin:3px 0 13px;line-height:1.45}
.vp-q{font-size:12px;font-weight:700;color:rgba(255,255,255,.92);margin-bottom:9px;letter-spacing:.01em}
.vp-opt{position:relative;display:block;width:100%;text-align:left;margin-bottom:8px;padding:10px 12px;border-radius:12px;
  border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.035);cursor:pointer;overflow:hidden;color:#fff;
  transition:border-color .15s,background .15s,transform .12s}
.vp-opt:hover{border-color:rgba(251,191,36,.55);transform:translateY(-1px)}
.vp-opt:disabled{cursor:default;transform:none}
.vp-opt.picked{border-color:rgba(251,191,36,.9);background:rgba(251,191,36,.09)}
.vp-bar{position:absolute;left:0;top:0;bottom:0;width:0;z-index:0;transition:width .55s cubic-bezier(.4,0,.2,1);
  background:linear-gradient(90deg,rgba(251,191,36,.22),rgba(244,114,182,.14))}
.vp-opt-label{position:relative;z-index:1;font-weight:800;font-size:12.5px;color:#fff7e6}
.vp-opt-desc{position:relative;z-index:1;font-size:10.5px;color:rgba(255,255,255,.55);margin-top:2px;line-height:1.35}
.vp-opt-pct{position:absolute;right:11px;top:50%;transform:translateY(-50%);font-size:12px;font-weight:800;color:#fde68a;z-index:2}
.vp-voted{font-size:10.5px;color:rgba(110,231,160,.92);margin-top:4px;letter-spacing:.2px;font-weight:600}
.vp-hint{font-size:10.5px;color:rgba(255,255,255,.42);margin-top:4px}
.vp-inplay{margin-top:13px;padding:11px 12px;border-radius:11px;background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.18);
  font-size:11px;color:rgba(255,255,255,.8);line-height:1.5}
.vp-ip-eyebrow{font-family:'VT323',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(251,191,36,.6);display:block;margin-bottom:3px}
.vp-inplay b{color:#fde68a;font-weight:800}
#day-hist-btn{
  position:fixed;top:22px;right:18px;z-index:35;
  display:flex;align-items:center;gap:6px;
  padding:7px 13px;border-radius:20px;
  background:rgba(255,255,255,.09);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.2);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;
  color:rgba(255,255,255,.72);letter-spacing:.3px;
  cursor:pointer;white-space:nowrap;
  transition:background .2s,border-color .2s,color .2s,box-shadow .2s;
  box-shadow:0 2px 12px rgba(0,0,0,.35);
}
#day-hist-btn:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.38);color:#fff;box-shadow:0 2px 18px rgba(0,0,0,.45)}
#day-hist-btn.active{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.35);color:#fff}
#day-history-panel{
  position:fixed;top:66px;right:18px;left:auto;z-index:40;width:244px;
  background:rgba(4,8,22,.92);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.08);border-radius:14px;
  max-height:0;overflow:hidden;opacity:0;pointer-events:none;
  transition:max-height .32s cubic-bezier(.4,0,.2,1),opacity .2s ease;
}
#day-history-panel.open{max-height:400px;opacity:1;pointer-events:auto}
.dhp-head{
  font-family:'Plus Jakarta Sans',sans-serif;font-size:9px;font-weight:800;
  letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.25);
  padding:11px 14px 9px;border-bottom:1px solid rgba(255,255,255,.05);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.dhp-back{
  background:none;border:none;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:9px;font-weight:700;color:rgba(255,255,255,.25);
  cursor:pointer;letter-spacing:.5px;padding:0;transition:color .15s;
}
.dhp-back:hover{color:rgba(255,255,255,.6)}
.dhp-scroll{overflow-y:auto;max-height:350px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.06) transparent}
.dhp-chips{padding:8px 10px 10px;display:flex;flex-direction:column;gap:5px}
.dhp-chip{
  display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:9px;
  border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;
  color:rgba(255,255,255,.5);cursor:pointer;
  transition:background .15s,border-color .15s;
}
.dhp-chip:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.14);color:rgba(255,255,255,.8)}
.dhp-chip.cur{border-color:rgba(34,197,94,.3);color:rgba(255,255,255,.75)}
.dhp-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;flex-shrink:0;animation:cdot 2s ease-in-out infinite}
.dhp-chip-meta{font-size:10px;color:rgba(255,255,255,.28);font-weight:500;margin-left:auto;white-space:nowrap}
.dhp-drama{font-size:13px;color:rgba(255,255,255,.7);line-height:1.57;font-style:italic;
  padding:12px 14px 14px}
.dhp-ongoing{font-size:12.5px;color:rgba(255,255,255,.5);line-height:1.55;font-style:italic;
  padding:12px 14px 14px}

#day-stamp{position:fixed;top:58px;left:16px;z-index:30;pointer-events:none;line-height:1.15}
#pulse{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:30;pointer-events:none;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-style:italic;font-weight:500;
  color:rgba(255,255,255,.78);letter-spacing:.2px;text-align:center;max-width:340px;line-height:1.4;
  text-shadow:0 1px 3px rgba(0,0,0,.6),0 1px 3px rgba(0,0,0,.75),0 1px 10px rgba(0,0,0,.4)}
#pulse:not(:empty)::before{content:'✦ LATEST FROM POLITICANA';display:block;
  font-family:'VT323',monospace;font-size:10px;font-style:normal;font-weight:400;
  letter-spacing:2px;color:rgba(255,255,255,.5);text-transform:uppercase;margin-bottom:3px;
  text-shadow:0 1px 3px rgba(0,0,0,.6)}
#scene-line{position:fixed;left:50%;transform:translateX(-50%);z-index:30;pointer-events:none;
  width:380px;max-width:88vw;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:11.5px;font-weight:500;
  color:rgba(255,255,255,.82);letter-spacing:.2px;text-align:center;line-height:1.5;
  text-shadow:0 1px 3px rgba(0,0,0,.6),0 1px 3px rgba(0,0,0,.8),0 1px 10px rgba(0,0,0,.45)}
#ds-day{font-family:'Plus Jakarta Sans',sans-serif;font-size:38px;font-weight:800;
  color:rgba(255,255,255,.1);letter-spacing:-1px}
#ds-cycle{font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;
  color:rgba(255,255,255,.07);letter-spacing:3.5px;text-transform:uppercase}

/* ── CHARACTERS ── */
.char{position:absolute;z-index:20;transform:translate(-50%,-100%);
  transition:left 2.8s cubic-bezier(.4,0,.2,1),top 2.8s cubic-bezier(.4,0,.2,1)}
.char-svg{display:block;margin:0 auto;filter:drop-shadow(0 6px 14px rgba(0,0,0,.65));animation:bob 2.4s ease-in-out infinite}
.char-svg.sad{animation:bob-slow 3.5s ease-in-out infinite}
.char-svg.angry{animation:bob-tense .9s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes bob-slow{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes bob-tense{0%,100%{transform:translateY(0) rotate(-.5deg)}50%{transform:translateY(-3px) rotate(.5deg)}}
/* ── INTERACTION OVERLAYS ── */
.interact-overlay{position:absolute;z-index:19;transform:translate(-50%,-50%);pointer-events:none;transition:opacity .4s}
.char.sitting{margin-top:10px}
/* nametag is OUT of flow so it never adds height to .char — the figure's FEET stay anchored
   exactly on the waypoint (otherwise the tag's height lifts the figure off the deck). */
.nametag{position:absolute;top:100%;left:50%;transform:translateX(-50%);
  font-size:7.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;
  margin-top:1px;padding:2px 6px;border-radius:20px;width:fit-content;white-space:nowrap;
  background:rgba(0,0,0,.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.nametag:empty{display:none}  /* unnamed stray: hide tag until it's named */

/* ── SPEECH BUBBLES ── */
.bubble{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);
  background:rgba(10,18,32,.82);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);
  color:#f1f5f9;padding:3px 6px;border-radius:7px;
  font-size:6.5px;font-weight:600;max-width:80px;min-width:48px;text-align:center;
  line-height:1.4;pointer-events:none;white-space:normal;z-index:25;
  text-shadow:0 1px 2px rgba(0,0,0,.6);box-shadow:0 3px 10px rgba(0,0,0,.4);
  border:1px solid rgba(255,255,255,.15);border-top-width:2px}
.bubble::after{display:none}
.bubble-name{font-size:6px;font-weight:800;letter-spacing:.9px;text-transform:uppercase;margin-bottom:2px}
.bubble-text{font-size:6.5px}
.bubble-text.dog-emote{font-size:15px;line-height:1}

/* ── BOTTOM FEED DRAWER ── */
#chat-panel{
  position:fixed;left:0;right:0;bottom:52px;
  height:44px;overflow:hidden;
  background:rgba(10,14,24,.9);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);

  border-top:1px solid rgba(255,255,255,.1);
  transition:height .38s cubic-bezier(.4,0,.2,1),
             box-shadow .38s ease;
}
#chat-panel.feed-open{
  height:52vh;

}
/* Drag pill */
#feed-pill{

#chat-panel.feed-open #feed-pill{background:rgba(255,46,120,.5)}
#chat-header{
  position:relative;
  padding:5px 14px 5px;font-family:'VT323',monospace;font-size:16px;color:#ff2d78;
  letter-spacing:2.5px;display:flex;align-items:center;justify-content:center;gap:7px;
  cursor:pointer;flex-shrink:0;user-select:none;
  border-bottom:1px solid rgba(255,255,255,.0);

}

#chat-dot{width:6px;height:6px;border-radius:50%;background:#ff2d78;animation:cdot 2s ease-in-out infinite;flex-shrink:0}

/* Absolutely center the ISLAND FEED label (on all widths) so the chevron's

#feed-label{display:inline-flex;align-items:center;gap:7px;position:absolute;left:50%;transform:translateX(-50%);pointer-events:none}

#chat-feed{flex:1;overflow-y:auto;padding:8px 12px 4px;display:flex;flex-direction:column;gap:5px;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
#chat-feed::-webkit-scrollbar{width:3px}
#chat-feed::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
.cl{font-family:'VT323',monospace;font-size:15px;line-height:1.3;word-break:break-word}
.cl.interaction{color:#fbbf24}
.cl-label{font-size:11px;letter-spacing:.8px;opacity:.78;text-transform:uppercase}

.cl-msg{font-family:'VT323',monospace;font-size:14px;line-height:1.3;padding:1px 4px;word-break:break-word}

.cl-absent-txt{color:#94a3b8}

.cl-latest{background:rgba(255,45,120,.06);border-left:2px solid rgba(255,45,120,.32);padding-left:5px;margin-left:-2px;border-radius:0 4px 4px 0}
.cl-ts-latest{background:rgba(255,45,120,.11)!important;color:rgba(255,160,200,.85)!important;border:1px solid rgba(255,45,120,.22);border-radius:5px;padding-left:8px;padding-right:8px}

/* ── HUD ── */
#hud{position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(2,6,23,.93);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);

  display:flex;align-items:center;gap:.6rem;height:52px}

/* Status strip */
#status-strip{display:flex;align-items:center;gap:.3rem;font-size:10px;flex-shrink:0}

.stp.done{color:#4ade80;border-color:rgba(74,222,128,.4);background:rgba(74,222,128,.07)}
.stp.current{color:rgba(255,255,255,.75);border-color:rgba(255,255,255,.28);background:rgba(255,255,255,.09)}
@keyframes spulse{0%,100%{opacity:1}50%{opacity:.5}}
.stp-arr{color:rgba(255,255,255,.12);font-size:9px}

/* Tiny status info */
#status-info{font-size:9px;color:rgba(255,255,255,.6);white-space:nowrap;flex-shrink:0;line-height:1.3;letter-spacing:.2px}
#status-info span{color:rgba(255,255,255,.85)}
#status-msg{font-size:9px;color:rgba(255,255,255,.3);font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px}

/* Buttons */
.hud-actions{display:flex;align-items:center;gap:.45rem;margin-left:auto;flex-shrink:0}
#story-btn{display:inline-flex;align-items:center;gap:.2rem;padding:.28rem .7rem;
  border-radius:18px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);
  color:rgba(255,255,255,.5);font-size:11px;font-weight:700;letter-spacing:.3px;
  text-transform:uppercase;text-decoration:none;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif}
#story-btn:hover{border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.85);background:rgba(255,255,255,.09)}

/* ── MOBILE ── */
@media(max-width:768px){
  /* Horizontal pan ON (vertical locked) so the wider-than-screen yacht can be swiped bow→stern.
     #viewport is the horizontal scroll container (its wide #world child overflows it); the
     layout JS pans it via scroller()/scrollLeft. The BODY stays clipped (overflow:hidden,
     inherited from the base html,body rule) so the position:fixed HUD overlays — which live
     OUTSIDE #viewport — are anchored to the stable viewport and never jitter during a swipe. */
  html,body{overflow:hidden;width:100%;height:100%}
  /* Mobile: #world is rendered WIDER than #viewport (full yacht at a height-fit scale, width
     set in px by updateWorld) so #viewport can be swiped left/right to pan bow→stern.
     #viewport is the horizontal scroller (overflow-x:auto); #world just overflows it.
     Characters + structures use the same worldMetrics() transform so feet stay on the decks. */
  #viewport{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior-x:contain;height:calc(100dvh - var(--stage-bottom))}
  #world{height:100%}
  /* HUD: 3-row layout — cycle strip + timing visible on mobile */
  #status-msg{display:none}
  #hud{padding:5px .75rem 4px;height:auto;flex-wrap:wrap;align-content:flex-start;gap:3px .3rem}
  .hud-actions{order:1}
  #status-strip{display:flex;flex-basis:100%;order:10;gap:.2rem}
  #status-info{display:block;flex-basis:100%;order:11}
  .stp{font-size:8px;padding:.1rem .3rem}
  .stp-arr{font-size:8px}
  /* Push chat panel above the now-taller HUD. */
  #chat-panel{bottom:var(--above-hud)}
  #story-btn{padding:.28rem .55rem;font-size:10px}
  .bubble{max-width:82px;padding:3px 6px}
  .bubble-text{font-size:7.5px}
  #pulse{top:78px;font-size:11px;max-width:78vw;color:rgba(255,255,255,.85)}
  #scene-line{font-size:10.5px;width:78vw;color:rgba(255,255,255,.85)}
  /* no hover on touch — show structure names faintly so they're not invisible */
  .struct-label{color:rgba(255,255,255,.6)}
  #day-hist-btn{top:14px;right:12px;padding:5px 10px;font-size:10px}
  #vote-pill{top:14px;right:88px;padding:5px 11px;font-size:10px}
  #vote-panel{top:48px;left:12px;right:12px;width:auto;max-width:none}
  #day-stamp{left:13px;top:50px}
  #day-history-panel{top:52px;right:12px;width:220px}
  /* res-hud now anchors bottom-right via the base rule on all sizes */
  .stat-card{display:none}
  .stat-card.tap-open{display:block;opacity:1;transform:translateY(0)}
  .stat-card.right,.stat-card.left{left:50%;transform:translateX(-50%);right:auto}
  .stat-card.tap-open.right,.stat-card.tap-open.left{transform:translateX(-50%)}
  .stat-card.tap-open.below{transform:translateX(-50%)}
  /* Feed drawer taller on mobile */
  #chat-panel.feed-open{height:62vh}
}

/* ── HOVER STAT CARD ── */
.stat-card{
  position:absolute;bottom:110%;pointer-events:none;z-index:80;
  width:200px;background:rgba(0,0,0,.92);border-radius:12px;
  padding:11px 13px;opacity:0;transform:translateY(6px);
  transition:opacity .18s ease,transform .18s ease;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);

}
.char:hover .stat-card{opacity:1;transform:translateY(0)}
.stat-card.right{left:90%;transform:translateY(6px)}
.stat-card.left{right:90%;transform:translateY(6px)}
.char:hover .stat-card.right{transform:translateY(0)}
.char:hover .stat-card.left{transform:translateY(0)}

.stat-card.below.left{transform:translateY(-6px)}
.char:hover .stat-card.below.right,.char:hover .stat-card.below.left{transform:translateY(0)}
.sc-name{font-size:17px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.sc-mood{font-size:13px;color:rgba(255,255,255,.45);letter-spacing:.5px;margin-bottom:8px;text-transform:uppercase}
.sc-cond{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.4px;padding:2px 7px;border-radius:7px;margin-bottom:8px}
.sc-cond-injured{background:rgba(248,113,113,.16);color:#fca5a5;border:1px solid rgba(248,113,113,.35)}
.sc-cond-sick{background:rgba(192,132,252,.16);color:#d8b4fe;border:1px solid rgba(192,132,252,.35)}
.sc-section{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;border-bottom:1px solid rgba(255,255,255,.06);padding-bottom:2px}
.sc-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.sc-label{font-size:12px;color:rgba(255,255,255,.4);width:68px;text-transform:uppercase;letter-spacing:.3px;flex-shrink:0}
.sc-bar{flex:1;height:3px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.sc-fill{height:100%;border-radius:3px}
.sc-val{font-size:12px;color:rgba(255,255,255,.5);width:22px;text-align:right;flex-shrink:0}
.sc-bond{font-size:13px;margin-bottom:2px}

/* ── STRUCTURES LAYER ── */
#structures-layer{position:absolute;inset:0;pointer-events:none;z-index:5;transform:translateY(calc(-1 * var(--world-shift,0px)))}
.struct{position:absolute;transform:translate(-50%,-50%);pointer-events:auto;text-align:center;line-height:1;cursor:default}

.struct-cond{width:30px;height:3px;border-radius:2px;background:rgba(0,0,0,.45);margin:1px auto 0;overflow:hidden}
.struct-cond-fill{height:100%;border-radius:2px}
.struct.discovery .struct-svg{filter:drop-shadow(0 0 6px rgba(251,191,36,.6)) drop-shadow(0 3px 8px rgba(0,0,0,.5))}

#res-card{

<body>
<!-- ══ VIEWPORT (the ONLY horizontal scroll container on mobile) ════════════════
     On mobile #viewport scrolls sideways (overflow-x:auto) while the body stays clipped,
     so the wider-than-screen yacht (#world) can be swiped bow→stern. Crucially, ALL the
     position:fixed HUD overlays live OUTSIDE #viewport (direct body children below), so
     they are positioned against the stable viewport and never jitter while the scene pans.
     On desktop #viewport is a plain non-scrolling container (its #world child fits). -->
<div id="viewport">
<div id="world" class="afternoon">
<canvas id="stars"></canvas>

<!-- ══ SCENE DECORATION LAYERS (inside the scroller — they pan with the yacht) ══ -->
<div id="structures-layer"></div>
<div id="vignette"></div>
<div id="color-wash"></div>

<!-- ══ WORLD SVG ══════════════════════════════════════════ -->
<svg id="world-svg" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMin slice" xmlns="http://www.w3.org/2000/svg">
<defs>
  <!-- ARCTIC SKIES — cold ice-blue daylight, deep arctic night -->
  <linearGradient id="sky-morning" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1e3a5f"/><stop offset="22%" stop-color="#3b6ea5"/>
    <stop offset="48%" stop-color="#7dd3fc"/><stop offset="72%" stop-color="#bae6fd"/>
    <stop offset="100%" stop-color="#e0f2fe"/>
  </linearGradient>
  <linearGradient id="sky-midday" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0c4a6e"/><stop offset="35%" stop-color="#0ea5e9"/>
    <stop offset="70%" stop-color="#7dd3fc"/><stop offset="100%" stop-color="#e0f2fe"/>
  </linearGradient>
  <linearGradient id="sky-afternoon" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#155e8c"/><stop offset="40%" stop-color="#38bdf8"/>
    <stop offset="75%" stop-color="#bae6fd"/><stop offset="100%" stop-color="#f0f9ff"/>
  </linearGradient>
  <linearGradient id="sky-evening" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#312e81"/><stop offset="24%" stop-color="#5b21b6"/>
    <stop offset="50%" stop-color="#9d5cc9"/><stop offset="72%" stop-color="#f0abfc"/>
    <stop offset="88%" stop-color="#fcd9b6"/><stop offset="100%" stop-color="#fde68a"/>
  </linearGradient>
  <linearGradient id="sky-night" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#020812"/><stop offset="40%" stop-color="#06101c"/>
    <stop offset="80%" stop-color="#0c1b2e"/><stop offset="100%" stop-color="#13294a"/>
  </linearGradient>
  <linearGradient id="sky-dawn" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#06101c"/><stop offset="28%" stop-color="#1e1b4b"/>
    <stop offset="52%" stop-color="#3730a3"/><stop offset="72%" stop-color="#7c6ad6"/>
    <stop offset="88%" stop-color="#c4b5fd"/><stop offset="100%" stop-color="#fde68a"/>
  </linearGradient>
  <!-- FROZEN SEA — deep teal water showing through the cracks -->
  <linearGradient id="ocean-g" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#bae6fd"/><stop offset="35%" stop-color="#7dd3fc"/>
    <stop offset="70%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#0c4a6e"/>
  </linearGradient>
  <linearGradient id="ice-sheet" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#f0f9ff"/><stop offset="55%" stop-color="#e0f2fe"/>
    <stop offset="100%" stop-color="#bae6fd"/>
  </linearGradient>
  <linearGradient id="hull-g" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#475569"/><stop offset="55%" stop-color="#334155"/>
    <stop offset="100%" stop-color="#1e293b"/>
  </linearGradient>
  <linearGradient id="superstructure-g" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#f8fafc"/><stop offset="60%" stop-color="#e2e8f0"/>
    <stop offset="100%" stop-color="#cbd5e1"/>
  </linearGradient>
  <radialGradient id="cabin-glow-g" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#fde68a" stop-opacity=".9"/>
    <stop offset="55%" stop-color="#fbbf24" stop-opacity=".45"/>
    <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
  </radialGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <!-- pale arctic sun -->
  <radialGradient id="sun-halo" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#f0f9ff" stop-opacity=".6"/>
    <stop offset="35%" stop-color="#e0f2fe" stop-opacity=".3"/>
    <stop offset="100%" stop-color="#bae6fd" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="sun-glint" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#f0f9ff" stop-opacity=".5"/>
    <stop offset="100%" stop-color="#f0f9ff" stop-opacity="0"/>
  </linearGradient>
  <!-- stove / cabin warm glow (id preserved for applySky) -->
  <radialGradient id="fire-glow-g" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#fde68a" stop-opacity=".7"/>
    <stop offset="45%" stop-color="#fbbf24" stop-opacity=".28"/>
    <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="moon-halo" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#e2e8f0" stop-opacity=".4"/>
    <stop offset="100%" stop-color="#cbd5e1" stop-opacity="0"/>
  </radialGradient>
  <!-- AURORA ribbons (night only) -->

// ── SGT TIME ─────────────────────────────────────────────
const RUN_HOURS = [7,12,18,23]
const CYCLE_NAMES = {7:'morning',12:'midday',18:'evening',23:'night'}

function getSGT() {
  const now = new Date()
  return new Date(now.getTime() + now.getTimezoneOffset()*60000 + 8*3600000)
}

function skyFromHour(h) {
  if(h>=23||h<7)  return 'night'
  if(h<12) return 'morning'
  if(h<18) return 'midday'
  return 'evening'
}

function fmtTime(sgt) {
  const h=sgt.getHours(), m=String(sgt.getMinutes()).padStart(2,'0')
  const ap=h>=12?'pm':'am', dh=h%12||12
  return `${dh}:${m}${ap}`
}

const RUN_MINUTES = [{h:7,m:0},{h:12,m:30},{h:18,m:0},{h:23,m:0}]
function nextRun(sgt) {
  const total=sgt.getHours()*60+sgt.getMinutes()
  let nr=RUN_MINUTES.find(r=>r.h*60+r.m>total)
  if(!nr) nr={h:RUN_MINUTES[0].h+24,m:RUN_MINUTES[0].m}
  const diff=nr.h*60+nr.m-total, dh=Math.floor(diff/60), dm=diff%60
  const h24=nr.h%24, ap=h24>=12?'pm':'am', h12=h24%12||12
  const mStr=nr.m>0?`:${String(nr.m).padStart(2,'0')}`:':00'
  return { time:`${h12}${mStr}${ap}`, cd:dh>0?`${dh}h ${dm}m`:`${dm}m` }
}

function applySky(sky) {
  document.getElementById('sky-bg')?.setAttribute('fill',`url(#sky-${sky})`)
  const isNight=sky==='night'||sky==='dawn'
  document.getElementById('sun-group')?.setAttribute('opacity',isNight?'0':'1')
  document.getElementById('sun-reflection')?.setAttribute('opacity',isNight?'0':'.85')
  document.getElementById('moon-group')?.setAttribute('opacity',isNight?'1':'0')
  document.getElementById('moon-halo-c')?.setAttribute('opacity',isNight?'1':'0')
  document.getElementById('night-stars')?.setAttribute('opacity',isNight?'1':'0')
  document.getElementById('fire-glow')?.setAttribute('opacity',isNight?'1':'0')
  document.getElementById('fireflies')?.setAttribute('opacity',isNight?'1':'0')
  document.getElementById('night-overlay')?.setAttribute('opacity',isNight?'0.48':'0')
  drawStars(isNight)
  document.getElementById('world').className=isNight?'night':sky
}

  const sgt=getSGT()

const isMobile = () => window.innerWidth <= 768
// Height of the world stage = viewport minus the reserved bottom bars. ALL world/character
// layout uses this (not window.innerHeight) so everything fits above the bottom UI.
function stageH() {
  const w = document.getElementById('world')
  return (w && w.clientHeight) || window.innerHeight
}
function getWorldWidth() {
  const w = document.getElementById('world')
  return (w && w.clientWidth) || window.innerWidth
}
let mobileScrollInited = false
// On mobile #viewport is the horizontal scroll container (CSS sets #viewport overflow-x:auto);
// its wide #world child overflows it. ALL pan logic goes through scroller() so art + characters
// stay locked and the whole yacht is reachable. The body never scrolls, so the body-level
// position:fixed HUD overlays (OUTSIDE #viewport) stay rock-solid while the scene pans.
// On desktop #world fits #viewport exactly, so the scroller never horizontally scrolls.
function scroller(){ return document.getElementById('viewport') || document.body }
function viewportW(){ const s=scroller(); return (s && s.clientWidth) || window.innerWidth }
function maxScrollX(){ return Math.max(0, getWorldWidth() - viewportW()) }
function setScrollX(x){ const s=scroller(); s.scrollLeft = Math.min(maxScrollX(), Math.max(0, x)) }
function getScrollX(){ return scroller().scrollLeft }

// Waypoints that count as "physically together" for interaction rendering
const WP_ADJACENT = {

  helm:['bridge','captains_chair'],
  lounge:['lounge_bar','lounge_couch'],           lounge_bar:['lounge','lounge_couch'],

  deck_rail:['stern','jacuzzi'],                   stern:['deck_rail','gangway'],
  gangway:['stern','lifeboat'],                    lifeboat:['gangway'],

}

// Vertical placement of the sliced world art. The art is wider-than-tall (10:6), so on
// wide screens it overflows vertically and must be cropped. We push it UP to reveal the
// beach/ocean at the bottom, but CAP the top crop at MOUNTAIN_SAFE (just above the NE
// cliff peak at viewBox y≈160) so the mountain is never sliced off. Any leftover overflow
// then trims a little ocean instead. Returns the screen-px offset of viewBox y=0.
const MOUNTAIN_SAFE = 150
function worldYOffset(vh, scale) {
  const cropVB = Math.max(0, 600 - vh/scale)      // total vertical overflow, in viewBox units
  return -Math.min(cropVB, MOUNTAIN_SAFE) * scale  // shift up, but never past the mountain peak
}
// ── UNIFIED WORLD TRANSFORM ───────────────────────────────────────────────────
// The single source of truth that maps the 1000×600 viewBox into #world pixels. The
// background SVG (sized + shifted in updateWorld) and every character/structure position
// go through THIS, so the painted decks and the characters' feet can never drift apart —
// on desktop OR mobile.
//   x_px = offX + sx*scaleX ;  y_px = offY + sy*scale
function worldMetrics() {
  const W = getWorldWidth(), H = stageH()
  const scale = Math.max(W/1000, H/600)   // COVER: fill the whole stage, no dark gaps
  const offX = (W - 1000*scale)/2          // centre horizontally (xMid) — keeps the yacht's
                                           // central decks (where all 5 stand) in view
  if (isMobile()) {
    // ── MOBILE: render the FULL yacht WIDER than the phone, then let the user swipe
    //    left/right to pan bow→stern. The scene is HEIGHT-fit (so the vessel reads at a
    //    comfortable size) and the world is exactly the full viewBox width at that scale —
    //    so #world overflows #viewport horizontally and #viewport is the touch-scroll
    //    container (CSS overflow-x:auto). Because the world IS the whole viewBox, offX=0:
    //    every waypoint (bow at sx≈270 → lifeboat at sx≈870) is reachable by scrolling, and
    //    feet land on the painted decks just like desktop. ──
    const mScale = (H/600)*1.18            // height-fit (+ a touch of zoom so the hull reads big)
    const Wfull = 1000*mScale               // full viewBox width in px — the scroll content width
    // Anchor the hull's waterline (viewBox y≈468) at ~70% of the stage: sky + superstructure +
    // deck (all chars, sy 316–410) read up top, the full hull sits mid-frame, only a modest
    // strip of grounding ice + floes shows below.
    const offY = Math.round(H*0.70 - 468*mScale)
    const clamped = Math.max(Math.min(offY, 0), H - 600*mScale)
    return {W:Wfull, H, scale:mScale, scaleX:mScale, offX:0, offY:clamped, worldWidth:Wfull}
  }
  // Desktop: cover-fill, shift up (capped at the mountain peak) to frame the yacht + ocean.
  return {W, H, scale, scaleX:scale, offX, offY:worldYOffset(H, scale)}
}
function svgToViewport(sx, sy) {
  const m = worldMetrics()
  return {left:((m.offX + sx*m.scaleX)/m.W*100)+'%', top:((m.offY + sy*m.scale)/m.H*100)+'%'}
}

function toPos(x, y, waypoint) {
  if (waypoint && WAYPOINTS[waypoint]) {
    const {sx,sy}=WAYPOINTS[waypoint]
    return svgToViewport(sx, sy)
  }
  const safeMaxPct = 90
  const leftPct = 5 + (x / 100) * (safeMaxPct - 5)
  return {left: leftPct+'%', top:(48+(y/100)*32)+'%'}
}

const CYCLE_HOUR = {morning:'7am',midday:'12:30pm',evening:'6pm',night:'11pm'}

function getCharColor(cid){return CHAR_COLOR[cid]||S.chars[cid]?.color||'#e2e8f0'}

function fmtSGT(ts) {
  if(!ts) return ''
  const t = ts.split('T')[1]
  if(!t) return ''
  const [hStr, mStr] = t.split(':')
  let h = parseInt(hStr), m = parseInt(mStr)
  const ap = h >= 12 ? 'PM' : 'AM'
  h = h % 12 || 12
  return `${h}:${String(m).padStart(2,'0')} ${ap}`
}

function cycleLabel(e) {
  const time = fmtSGT(e.timestamp)
  return `Day ${e.day||1} · ${time || CYCLE_HOUR[e.cycle]||e.cycle||''}`
}

function renderChat() {
  const feed=document.getElementById('chat-feed')
  if(!feed||!S.feed) return
  const entries=S.feed.slice(-45)
  // Find the latest cycle label so we can highlight it
  let latestLbl=''
  entries.forEach(e=>{ latestLbl=cycleLabel(e) })
  let html=''
  let lastLabel=''
  entries.forEach(e=>{
    const lbl=cycleLabel(e)
    const isLatest = lbl===latestLbl
    const lc = isLatest ? ' cl-latest' : ''
    const msgTime = fmtSGT(e.timestamp) || CYCLE_HOUR[e.cycle] || ''
    const timeTag = msgTime ? `<span class="cl-time">D${e.day||1}·${msgTime.replace(' ','')}</span>` : ''
    if(lbl!==lastLabel){
      html+=`<div class="cl-ts${isLatest?' cl-ts-latest':''}">${lbl}</div>`
      lastLabel=lbl
    }
    if(e.type==='interaction'){
      html+=`<div class="cl interaction${lc}">${timeTag}<span class="cl-label">${e.description||''}</span></div>`
      // absent character context
      const present=(e.characters||[]).map(c=>c.toLowerCase())
      const absent=Object.keys(S.chars).filter(c=>!present.includes(c))
      absent.forEach(cid=>{
        const ctx=entries.find(x=>x.character===cid&&x.cycle===e.cycle&&x.day===e.day)
        if(ctx&&(ctx.action||ctx.thought)){
          const col=getCharColor(cid)
          html+=`<div class="cl-absent${lc}"><span style="color:${col};opacity:.6">${callName(cid)}</span><span class="cl-absent-txt"> — ${ctx.action||ctx.thought}</span></div>`
        }
      })
      const dlg=e.dialogue||[]
      const arr=Array.isArray(dlg)?dlg:[{speaker:(e.characters||['?'])[0],line:dlg}]
      arr.forEach(d=>{
        const spk=(d.speaker||'').toLowerCase()
        const col=getCharColor(spk)
        html+=`<div class="cl-msg${lc}"><span class="cl-spk" style="color:${col}">${callName(spk)}</span> <span class="cl-line">${d.line||''}</span></div>`
      })
    }
    // standalone character thought lines are intentionally not shown in the feed
  })
  feed.innerHTML=html
  feed.scrollTop=feed.scrollHeight
}

function separateChars(positions) {
  const MIN = 65
  const SEAT = 28   // interacting couples stay intimate, but never perfectly stacked — seat them side-by-side
  // Pairs with an active interaction are kept close (SEAT gap) instead of pushed fully apart (MIN).
  // Without this they'd stack exactly when the narrator puts both at the same waypoint.
  const interacting = new Set()
  Object.keys(S.chars).forEach(cid=>{
    const iw = S.chars[cid]?.interaction?.with
    if (iw) interacting.add([cid,iw].sort().join('_'))
  })
  for(let iter=0; iter<25; iter++) {
    for(let i=0; i<positions.length; i++) {
      for(let j=i+1; j<positions.length; j++) {
        if (Math.abs(positions[j].py - positions[i].py) > 45) continue   // different decks — never shove across rows
        const isPair = interacting.has([positions[i].id,positions[j].id].sort().join('_'))
        const minDist = isPair ? SEAT : MIN
        const dx=positions[j].px - positions[i].px
        const adist=Math.abs(dx)
        if(adist < minDist) {
          // separate HORIZONTALLY only — never vertically — so each figure keeps its waypoint's
          // deck height and its feet can't slide off the deck onto the hull when several cluster.
          const push=(minDist-adist)/2
          const dir=adist>0.5?(dx>0?1:-1):(isPair?1:(Math.cos(i*2.4)>=0?1:-1))
          positions[i].px -= dir*push
          positions[j].px += dir*push
        }
      }
    }
  }
  // clamp to safe zone — x across island, y to ground band only
  const W=getWorldWidth(), H=stageH()
  positions.forEach(p=>{
    p.px=Math.max(W*0.05, Math.min(W*0.90, p.px))
    p.py=Math.max(H*0.40, Math.min(H*0.90, p.py))
  })
  return positions
}

function nudgeBubbles(positions) {
  const GAP = 8           // min clear space between any two bubbles
  const BODY_HALF = 10    // half-width of a character body
  // Measure each bubble's REAL rendered size from the DOM (never guess a constant —
  // the rendered width varies with text length and breakpoint, so a fixed value
  // misses near-miss overlaps). Fall back only if the element isn't laid out yet.
  const dim = {}
  positions.forEach(p=>{
    const el = document.getElementById('bubble-'+p.id)
    dim[p.id] = { w: (el && el.offsetWidth) || 90, h: (el && el.offsetHeight) || 50 }
  })
  const offsets = {}
  positions.forEach(p=>{ offsets[p.id] = 0 })
  // Pass 1: bubble-vs-bubble horizontal separation, using each pair's true widths
  for(let i=0; i<positions.length; i++) {
    for(let j=i+1; j<positions.length; j++) {
      const a = positions[i], b = positions[j]
      const absDx = Math.abs(b.px - a.px)
      const dy = Math.abs(b.py - a.py)
      const needed = (dim[a.id].w + dim[b.id].w) / 2 + GAP
      if(absDx < needed && dy < 80) {
        const shift = (needed - absDx) / 2
        const leftFirst = a.px <= b.px
        offsets[a.id] += leftFirst ? -shift : shift
        offsets[b.id] += leftFirst ? shift : -shift
      }
    }
  }
  // Pass 2: single pass — push each bubble clear of every other character's body
  for(let i=0; i<positions.length; i++) {
    for(let j=0; j<positions.length; j++) {
      if(i===j) continue
      const clear = dim[positions[i].id].w / 2 + BODY_HALF + 2  // bubble half + body half + gap
      const bx = positions[i].px + offsets[positions[i].id]
      const dist = bx - positions[j].px
      if(Math.abs(dist) < clear) {
        offsets[positions[i].id] += dist >= 0 ? (clear - dist) : -(clear + dist)
      }
    }
  }
  positions.forEach(p=>{
    const b = document.getElementById('bubble-'+p.id)
    if(b) b.style.marginLeft = offsets[p.id] + 'px'
  })
  // Vertical stagger: 2D collision avoidance using each bubble's real measured size.
  // Horizontal overlap is a true rectangle test on measured widths, so two bubbles
  // can never visually overlap regardless of where characters move next cycle.
  // CRITICAL: each bubble's CSS bottom is relative to its OWN character's feet (py),
  // so two characters at different py have different screen baselines. We must run the
  // collision test in absolute SCREEN space — otherwise a stack offset can be cancelled
  // out by the characters' py difference and the bubbles land at the same height.
  const H = stageH()
  const sorted = [...positions].sort((a,b) => (a.px+offsets[a.id]) - (b.px+offsets[b.id]))
  const placed = []
  sorted.forEach(p => {
    const bx = p.px + offsets[p.id]
    const el = document.getElementById('bubble-'+p.id)
    const w = dim[p.id].w
    const ph = dim[p.id].h + GAP
    const ground = H - p.py          // char feet, measured from stage bottom (screen space)
    let bot = ground + 70, clear = false  // bubble baseline in screen space
    while(!clear) {
      clear = true
      for(const q of placed) {
        const xOverlap = Math.abs(bx - q.bx) < (w + q.w) / 2 + GAP
        // horizontal overlap + vertical overlap (rectangle test, screen space)
        if(xOverlap && !(bot >= q.bot + q.h || bot + ph <= q.bot)) {
          bot = q.bot + q.h   // jump directly above q
          clear = false; break
        }
      }
    }
    placed.push({bx, bot, h: ph, w})
    el.style.bottom = (bot - ground) + 'px'  // convert screen baseline back to per-character CSS bottom
  })
}

// ── INTERACTION RENDERING ────────────────────────────────────
function renderInteractions(positions) {
  document.querySelectorAll('.interact-overlay').forEach(e=>e.remove())
  const world = document.getElementById('world')
  const processed = new Set()

  Object.keys(S.chars).forEach(cid=>{
    const c = S.chars[cid]
    const el = document.getElementById('char-'+cid)
    if (!el) return

    // Reset state classes and inline transforms
    el.classList.remove('sitting')
    el.querySelector('.char-svg')?.style.removeProperty('transform')

    const intr = c.interaction
    if (!intr?.with || !intr?.state) return
    const other = intr.with, state = intr.state
    if (!S.chars[other]) return

    const myPos  = positions.find(p=>p.id===cid)
    const othPos = positions.find(p=>p.id===other)
    if (!myPos || !othPos) return

    const iAmLeft = myPos.px <= othPos.px

    if (state === 'back_to_back') {
      const svg = el.querySelector('.char-svg')
      if (svg && iAmLeft) svg.style.transform = 'scaleX(-1)'
    }
    if (state === 'sitting_together') el.classList.add('sitting')
    if (state === 'comforting') {
      const svg = el.querySelector('.char-svg')
      if (svg) svg.style.transform = iAmLeft ? 'rotate(7deg)' : 'rotate(-7deg)'
    }

    const pairKey = [cid,other].sort().join('_')
    if (processed.has(pairKey)) return
    processed.add(pairKey)

    // Use the SAME world dimensions the character px/py were computed against in
    // updateWorld (mobile world is wider than the viewport, H is the stage height),
    // otherwise the hand/log overlay drifts off the couple on mobile.
    const W=isMobile()?getWorldWidth():window.innerWidth, H=stageH()
    const midX=(myPos.px+othPos.px)/2
    const midY=(myPos.py+othPos.py)/2 - 34

    let inner = ''
    if (state === 'holding_hands') {
      inner = `<svg width="22" height="20" viewBox="0 0 20 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 16Q2 11 2 6Q2 2.5 5.5 2.5Q7.5 2.5 10 5.5Q12.5 2.5 14.5 2.5Q18 2.5 18 6Q18 11 10 16Z" fill="rgba(249,168,212,.92)"/>
      </svg>`
    } else if (state === 'sitting_together') {
      inner = `<svg width="30" height="10" viewBox="0 0 30 10" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="2" width="28" height="6" rx="3" fill="rgba(146,64,14,.55)"/>
        <ellipse cx="15" cy="8" rx="13" ry="3" fill="rgba(120,53,15,.35)"/>
      </svg>`
    }
    if (inner) {
      const div = document.createElement('div')
      div.className = 'interact-overlay'
      div.style.left = (midX/W*100)+'%'
      div.style.top  = (midY/H*100)+'%'
      div.innerHTML  = inner
      world.appendChild(div)
    }
  })
}

let _dynamicTiles = {}

async function loadDynamicTiles() {
  try {
    const r = await fetch('data/svg_library.json?v=' + Date.now())
    if(r.ok) {
      const lib = await r.json()
      _dynamicTiles = lib.tiles || {}
    }
  } catch {}
}

function getTile(type) {
  if(_dynamicTiles[type]) return _dynamicTiles[type]
  if(SEED_TILES[type])    return SEED_TILES[type]
  return SEED_TILES['default']
}

function updateFireChip() {
  const el = document.getElementById('fire-chip'); if(!el) return
  const fire = S.world?.fire
  if(!fire){ el.style.display='none'; return }
  const lit = !!fire.lit
  el.style.display = 'flex'
  el.className = lit ? 'lit' : 'out'
  el.innerHTML = lit ? '🔥 STOVE LIT' : '🌑 STOVE OUT'
}

function renderStructures() {
  const layer = document.getElementById('structures-layer')
  if(!layer) return
  const structs = [
    ...(S.world.structures||[]).filter(s => !s.baked),
    ...(S.world.discoveries||[]).map(d=>({...d, _isDisc:true}))
  ]
  layer.innerHTML = structs.map(s => {
    const tileKey = s._isDisc ? 'discovery' : s.type
    const tile    = getTile(tileKey)
    const label   = s.label || s.name || ''
    const cond = (!s._isDisc && typeof s.condition==='number') ? s.condition : null
    const condBar = (cond!==null && cond < 95)
      ? `<div class="struct-cond"><div class="struct-cond-fill" style="width:${Math.max(0,cond)}%;background:${cond>=60?'#4ade80':cond>=30?'#fbbf24':'#f87171'}"></div></div>`
      : ''
    return `<div class="struct${s._isDisc?' discovery':''}" style="left:${s.x}%;top:${s.y}%${cond!==null&&cond<40?';opacity:.7':''}">
      <svg class="struct-svg" viewBox="0 0 60 60" width="44" height="44" xmlns="http://www.w3.org/2000/svg">${tile}</svg>
      ${condBar}
      <span class="struct-label">${label}</span>
    </div>`
  }).join('')
}

let _activeRes = null

function buildResCardContent(k) {
  const res  = S.world?.resources      || {}
  const prev = S.world?.resources_prev || {}
  const val  = typeof res[k]==='number' ? res[k] : 0
  const prevVal = typeof prev[k]==='number' ? prev[k] : val

  const STATUS = {
    food:     ['Critically low — the ice-fishing lines must be worked now; stores are gone.', 'Dwindling stores. Someone needs to fish the hole before dark.', 'Ice-fishing and the galley larder keep everyone fed for now.'],
    water:    ['Dangerously low. No ice is melting and dehydration is real.',                  'Running short. More pack-ice needs melting on the stove soon.', 'Enough melted ice for now.'],
    wood:     ['Almost no fuel left. The stove will die without diesel or burnables.',         'Low fuel. One cold night would nearly drain the diesel & burnables.', 'Enough diesel & burnables to keep the stove going.'],
    medicine: ['Critically low. Out here, one injury or frostbite could be fatal.',           'Very little left. Use the medical kit carefully.',                'Enough to handle minor injuries and frostbite for now.'],
  }
  const tier = val<=20 ? 0 : val<=40 ? 1 : 2
  const statusLine = (STATUS[k]||['','Low.','Sufficient.'])[tier]

  const diff = val - prevVal
  const trend = diff>0 ? '↑' : diff<0 ? '↓' : '→'
  const trendCol = diff>0 ? '#4ade80' : diff<0 ? '#f87171' : 'rgba(255,255,255,.28)'

  const KEYS = {
    food:['food','eat','fish','catch','hungry','starv','meal','larder','galley','stores'],
    water:['water','drink','thirst','melt','ice','snow','dehydr'],
    wood:['fuel','diesel','wood','burn','stove','heat','cold','freez','timber'],
    medicine:['medicine','heal','kit','sick','injur','hurt','wound','frostbite'],
  }
  const kws = KEYS[k]||[]
  const mention = [...(S.feed||[])].reverse().find(e=>{
    const t=((e.thought||'')+(e.action||'')+(e.description||'')).toLowerCase()
    return kws.some(w=>t.includes(w))
  })
  const mentionHtml = mention
    ? `<div class="rc-mention">"${(mention.thought||mention.action||mention.description||'').slice(0,80)}"<span class="rc-who">${(mention.character||'someone')[0].toUpperCase()+(mention.character||'someone').slice(1)} · Day ${mention.day} ${mention.cycle||''}</span></div>`
    : ''

  const ICONS = {food:'🐟',water:'💧',wood:'⛽',medicine:'🩺'}
  const NAMES = {food:'Food',water:'Water',wood:'Fuel',medicine:'Medicine'}
  const col = val<=20?'#ef4444':val<=40?'#f59e0b':'#4ade80'

  return `<div class="rc-inner">
    <div class="rc-header">
      <span class="rc-icon">${ICONS[k]}</span>
      <span class="rc-name">${NAMES[k]}</span>
      <span class="rc-val" style="color:${col}">${val}</span>
      <span class="rc-trend" style="color:${trendCol}">${trend}</span>
    </div>
    <div class="rc-bar-wrap"><div class="rc-bar-fill" style="width:${val}%;background:${col}"></div></div>
    <div class="rc-status">${statusLine}</div>
    ${mentionHtml}
  </div>`
}

function toggleResCard(k) {
  const card = document.getElementById('res-card')
  if (!card) return
  document.querySelectorAll('.res-pill').forEach(p=>p.classList.remove('rp-active'))
  if (_activeRes === k) {
    card.classList.remove('open')
    _activeRes = null
    return
  }
  _activeRes = k
  document.querySelector(`.res-pill[data-key="${k}"]`)?.classList.add('rp-active')
  card.innerHTML = buildResCardContent(k)
  card.classList.add('open')
}

function renderResHud() {
  const hud = document.getElementById('res-hud')
  if(!hud) return
  const res = S.world.resources || {}
  const items = [
    {k:'food', icon:'🐟'},
    {k:'water', icon:'💧'},
    {k:'wood', icon:'⛽'},
    {k:'medicine', icon:'🩺'}
  ]
  hud.innerHTML = items.map(({k, icon}) => {
    const v = res[k] ?? '—'
    const col = typeof v==='number' ? (v<=20?'#ef4444':v<=40?'#f59e0b':'rgba(255,255,255,.55)') : 'rgba(255,255,255,.3)'
    return `<div class="res-pill" data-key="${k}" onclick="toggleResCard('${k}')"><span class="res-pill-icon">${icon}</span><span class="res-pill-val" style="color:${col}">${v}</span></div>`
  }).join('') + `<div id="res-card"></div>`
  // Re-open active card if it was open before re-render
  if (_activeRes) {
    const card = document.getElementById('res-card')
    if (card) { card.innerHTML = buildResCardContent(_activeRes); card.classList.add('open') }
    document.querySelector(`.res-pill[data-key="${_activeRes}"]`)?.classList.add('rp-active')
  }
}

// Reads S.chars[cid].appearance { skin, hair{style,color}, accessory, outfit }

// never throws when appearance is missing. The face rig (brows, eyes-*, blush,
// mouth ids + geometry) is preserved verbatim so applyFace/FACES keep working,
// and the feet ellipses (cy=-1) are untouched so characters stay grounded.

    case 'long': // straight hair falling past the shoulders, behind the body

    case 'bun': // top knot + smooth sides pulled back

// Accessories — front layer (over hair/face where appropriate).

  switch(acc){

    case 'hood': // raised hoodie hood: drapes down to the shoulders and frames the face
      return `<g>
        <path d="M -16 -55 C -18 -74 -10 -90 0 -90 C 10 -90 18 -74 16 -55 C 13 -58 11 -60 9 -61 C 11 -67 9 -73 4 -74.5 C 2 -78 -2 -78 -4 -74.5 C -9 -73 -11 -67 -9 -61 C -11 -60 -13 -58 -16 -55 Z" fill="${COL_HOOD}"/>

    case 'cap': // baseball cap: rounded crown hugging the head + forward brim
      return `<g>

        <path d="M -11.8 -75.5 L -18 -73.5 C -16.5 -70.5 -8.5 -71.5 -2.5 -74.5 Z" fill="${COL_CAP}"/>

    case 'headphones': // band over the crown + ear cups

    case 'none': default:
      return ''
  }
}

// Map each expression bucket -> puppy body language (ear rotation, tail behaviour)
const DOG_POSE = {
  happy:      {l:-22,r:22, tail:'wag'},
  smitten:    {l:-22,r:22, tail:'wag'},
  flirtatious:{l:-18,r:18, tail:'wag'},
  hopeful:    {l:-20,r:20, tail:'slow'},
  calm:       {l:-6, r:6,  tail:'slow'},
  neutral:    {l:0,  r:0,  tail:'none'},
  guarded:    {l:16, r:-16,tail:'none'},
  jealous:    {l:16, r:-16,tail:'none'},
  embarrassed:{l:10, r:-10,tail:'low'},
  sad:        {l:22, r:-22,tail:'tuck'},
  heartbroken:{l:26, r:-26,tail:'tuck'},
  angry:      {l:30, r:-30,tail:'none'},
  shocked:    {l:34, r:-34,tail:'tuck'},
  lustful:    {l:-10,r:10, tail:'slow'},
}
function applyDogExtras(cid, fk){
  const p = DOG_POSE[fk] || DOG_POSE.neutral
  const el = document.getElementById('ear-l-'+cid); const er = document.getElementById('ear-r-'+cid)
  if(el) el.style.transform = `rotate(${p.l}deg)`
  if(er) er.style.transform = `rotate(${p.r}deg)`
  const tail = document.getElementById('tail-'+cid)
  if(tail){
    tail.classList.remove('wag','slow')
    tail.style.transform = ''
    if(p.tail==='wag') tail.classList.add('wag')
    else if(p.tail==='slow') tail.classList.add('slow')
    else if(p.tail==='tuck') tail.style.transform = 'rotate(58deg)'
    else if(p.tail==='low') tail.style.transform = 'rotate(28deg)'
  }
}

function ensureCharDom(cid) {

function updateWorld() {
  const w=S.world
  document.getElementById('day-label').textContent='Day '+(w.day||1)
  document.getElementById('cycle-label').textContent=cap(w.cycle||'')
  document.getElementById('ds-day').textContent='Day '+(w.day||1)
  document.getElementById('ds-cycle').textContent=cap(w.cycle||'')
  if(w.pulse) document.getElementById('pulse').textContent=w.pulse
  positionSceneLine()

  const CHARS=Object.keys(S.chars)
  CHARS.forEach(cid=>ensureCharDom(cid))
  setHudVar()  // refresh --stage-bottom BEFORE laying out, so positions use the correct stage height
  // On mobile the world is rendered WIDER than the viewport (full yacht) so the page can pan
  // sideways. Set #world's pixel width to the full world width BEFORE measuring metrics that
  // read it, and clear it on desktop so the CSS width:100vw rule wins. Vertical sizing comes
  // from CSS (height:calc(100dvh - stage-bottom)).
  const _world = document.getElementById('world')
  if(_world){
    if(isMobile()){
      const mwScale = (stageH()/600)*1.18
      _world.style.width = Math.ceil(1000*mwScale)+'px'
    } else {
      _world.style.width = ''   // fall back to the CSS rule (width:100vw)
    }
  }
  // Size + place the background SVG to EXACTLY match worldMetrics() (the same transform the
  // characters use), so painted decks and feet stay locked together on desktop and mobile.
  const m = worldMetrics()
  const _svg=document.getElementById('world-svg')
  if(_svg){
    _svg.style.left=m.offX+'px'; _svg.style.top=m.offY+'px'; _svg.style.right='auto'; _svg.style.bottom='auto'
    _svg.style.width=(1000*m.scaleX)+'px'; _svg.style.height=(600*m.scale)+'px'
    _svg.style.transform='none'   // offset is baked into top/left now; no extra shift needed
  }
  // structures-layer still uses --world-shift; keep it in sync (0 means "no extra shift").
  document.documentElement.style.setProperty('--world-shift', '0px')
  const W=m.W, H=m.H
  // compute raw pixel positions
  const positions=CHARS.map(cid=>{
    const c=S.chars[cid]||{}
    const {left,top}=toPos(c.location?.x||50,c.location?.y||50,c.location?.waypoint)
    const px=parseFloat(left)/100*W
    const py=parseFloat(top)/100*H
    return {id:cid, px, py}
  })
  separateChars(positions)

  positions.forEach(p=>{
    const el=document.getElementById('char-'+p.id); if(!el) return
    el.style.left=(p.px/W*100)+'%'
    el.style.top=(p.py/H*100)+'%'
    applyFace(p.id)
    updateBubble(p.id)
    // keep nametag/bubble label in sync (so an unnamed stray's tag appears once it's named)
    const nm = S.chars[p.id] ? callName(p.id).toUpperCase() : ''
    const ntag = document.getElementById('nametag-'+p.id); if(ntag && ntag.textContent!==nm) ntag.textContent = nm
    const blab = document.getElementById('bubblename-'+p.id); if(blab && blab.textContent!==nm) blab.textContent = nm
  })

  nudgeBubbles(positions)
  renderInteractions(positions)
  renderChat()
  updateStatusBar()
  updateStatCards()
  renderStructures()
  renderResHud()
  updateFireChip()

  if(isMobile() && !mobileScrollInited) {
    mobileScrollInited = true
    requestAnimationFrame(() => {
      // Start centred on the vessel (the wide world overflows the viewport both sides).
      setScrollX(Math.round(maxScrollX() * 0.5))
    })
  }
}

function drawStars(active) {
  const c=document.getElementById('stars')
  if(!active){c.style.opacity='0';return}
  c.width=getWorldWidth();c.height=window.innerHeight*.34
  const ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height)
  for(let i=0;i<200;i++){
    const x=(Math.sin(i*137.5)*.5+.5)*c.width
    const y=(Math.sin(i*97.3)*.5+.5)*c.height
    const r=Math.sin(i*43.1)*.4+1.1
    const a=Math.sin(i*61.7)*.35+.75
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2)
    ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.fill()
  }
}

function cap(s){return s?s[0].toUpperCase()+s.slice(1):''}

// Prefers an explicit data `callname`, else first name, else capitalised id.
function callName(cid){ const c=S.chars&&S.chars[cid]; return (c&&c.callname)?c.callname:(c&&c.name?c.name.split(' ')[0]:cap(cid)); }

let S={chars:{},feed:[],world:{}}

async function reloadData(){
  const t=Date.now()
  try {
    const [c,f,w]=await Promise.all([
      fetch('data/characters.json?t='+t).then(r=>r.json()),
      fetch('data/feed.json?t='+t).then(r=>r.json()),
      fetch('data/world.json?t='+t).then(r=>r.json()),
    ])
    // Only re-render when a NEW cycle has actually been written — avoids needless
    // re-layout (and feed-scroll yanks) every poll when nothing changed.
    const changed = !S.world || w.last_cycle_key !== S.world.last_cycle_key
      || (f && S.feed && f.length !== S.feed.length)
    S.chars=c;S.feed=f;S.world=w
    if(changed) updateWorld()
  } catch(e){ /* transient fetch error — keep showing current state, try again next poll */ }
}
// Pick up new cycles automatically (data changes ~5x/day; poll is cheap and no-op when unchanged)
setInterval(reloadData, 120000)

const SC_COLORS = {marcus:'#93c5fd',ryan:'#fde68a',jade:'#f9a8d4',judy:'#99f6e4'}
const SC_FILL   = {marcus:'#60a5fa',ryan:'#fbbf24',jade:'#f472b6',judy:'#2dd4bf'}
const SCORE_LABELS = ['trust','openness','loneliness','resilience','ambition']
const SURVIVAL_LABELS = ['hunger','thirst','energy','health']
// survival bars are colour-coded by level: green (ok) / amber (low) / red (critical)
function survColor(v){ return v>=60?'#4ade80' : v>=30?'#fbbf24' : '#f87171' }
function getScColor(cid){return SC_COLORS[cid]||(S.chars[cid]?.color||'#94a3b8')}
function getScFill(cid){return SC_FILL[cid]||S.chars[cid]?.color||'#94a3b8'}

function buildStatCard(cid) {
  const el = document.getElementById('sc-'+cid)
  if(!el || !S.chars[cid]) return
  const c = S.chars[cid]
  const col = getScColor(cid)
  const fill = getScFill(cid)

  const scoreRows = SCORE_LABELS.map(k => {
    const v = c.scores?.[k] ?? 0
    return `<div class="sc-row">
      <span class="sc-label">${k}</span>
      <div class="sc-bar"><div class="sc-fill" style="width:${v}%;background:${fill}88"></div></div>
      <span class="sc-val">${v}</span>
    </div>`
  }).join('')

  const survRows = SURVIVAL_LABELS.map(k => {
    const v = c.scores?.[k] ?? (k==='health' ? 100 : 0)
    const sc = survColor(v)
    return `<div class="sc-row">
      <span class="sc-label">${k}</span>
      <div class="sc-bar"><div class="sc-fill" style="width:${v}%;background:${sc}"></div></div>
      <span class="sc-val" style="color:${sc}">${v}</span>
    </div>`
  }).join('')

  const others = Object.keys(S.chars).filter(k=>k!==cid)
  const bondRows = others.map(oid => {
    const rel = c.relationships?.[oid] || {}
    const cl = rel.closeness ?? 0
    const at = rel.attraction ?? 0
    const heart = at >= 30 ? ' ❤' : at >= 10 ? ' ·' : ''
    const oName = callName(oid)
    const oCol = getScColor(oid)
    return `<div class="sc-bond" style="color:rgba(255,255,255,.6)">
      <span style="color:${oCol}">${oName}</span>
      <span style="color:rgba(255,255,255,.3)"> — closeness </span>
      <span style="color:${fill}">${cl}</span>${heart ? `<span style="color:#f43f5e;font-size:11px">${heart}</span>` : ''}
    </div>`
  }).join('')

  el.style.borderColor = col+'44'
  el.style.border = `1px solid ${col}33`
  const condBadge = (c.condition && c.condition!=='healthy')
    ? `<div class="sc-cond sc-cond-${c.condition}">${c.condition==='injured'?'🤕 INJURED':'🤒 SICK'}</div>` : ''
  el.innerHTML = `
    <div class="sc-name" style="color:${col}">${c.name||cap(cid)}</div>
    <div class="sc-mood">${c.mood||'—'}</div>
    ${condBadge}
    <div class="sc-section">Stats</div>
    ${scoreRows}
    <div class="sc-section" style="margin-top:7px">Survival</div>
    ${survRows}
    <div class="sc-section" style="margin-top:7px">Bonds</div>
    ${bondRows}
  `

  // auto-flip horizontal + vertical based on character screen position
  const charEl = document.getElementById('char-'+cid)
  if(charEl) {
    const xPct = parseFloat(charEl.style.left||'50')
    const yPct = parseFloat(charEl.style.top||'50')
    el.classList.toggle('left', xPct > 55)
    el.classList.toggle('right', xPct <= 55)
    el.classList.toggle('below', yPct < 40)
  }
}

function updateStatCards() {
  Object.keys(S.chars).forEach(buildStatCard)
}

        return `<div class="dhp-chip${isCur?' cur':''}" onclick="showDayHistorySummary(${d})">

function showDayHistorySummary(day) {
  const inner = document.getElementById('dhp-inner')
  if(!inner) return
  // Prefer the whole-day recap (written at the night cycle). If the day is still in
  // progress, say so. Older days from before this feature fall back to the last event.
  const summ = S.world?.day_summaries?.[day]
  const isCurrent = day === (S.world?.day)
  let bodyHtml
  if (summ) {
    bodyHtml = `<div class="dhp-drama">${summ}</div>`
  } else if (isCurrent) {
    bodyHtml = `<div class="dhp-ongoing">Day ${day} is still unfolding — the full recap arrives at day's end.</div>`
  } else {
    const entries = (S.feed||[]).filter(e=>e.day===day)
    const interactions = entries.filter(e=>e.type==='interaction')
    const lastIntr = interactions[interactions.length-1]
    const dramaLine = lastIntr?.description
      || [...entries].reverse().find(e=>e.thought)?.thought || '—'
    bodyHtml = `<div class="dhp-drama">"${dramaLine}"</div>`
  }
  inner.innerHTML = `
    <div class="dhp-head">
      <span>Day ${day}</span>
      <button class="dhp-back" onclick="showDayHistoryChips()">← all days</button>
    </div>
    <div class="dhp-scroll">
      ${bodyHtml}
    </div>`
}

// Scene line: the "overnight → now" recap that sits directly under the LATEST headline.
// Position is MEASURED from the headline's real rendered bottom (never hardcoded) so it
// stays glued under it on every screen size and however many lines the headline wraps to.
function positionSceneLine(){
  const pulse = document.getElementById('pulse')
  const pr = pulse?.getBoundingClientRect()
  let blockBottom = (pr && pr.bottom) ? pr.bottom : 32
  const el = document.getElementById('scene-line')
  if(el){
    const txt = (S && S.world && S.world.scene) || ''
    el.textContent = txt
    if(!txt){ el.style.display='none' }
    else {
      el.style.display=''
      // sit just below the headline; fall back to a sane top if it isn't laid out yet
      el.style.top = (blockBottom + 6) + 'px'
    }
  }
  // (resource pills now live bottom-right via CSS — no headline-tucking needed)
}

function setHudVar(){
  const hud = document.getElementById('hud')
  const h = hud?.getBoundingClientRect().height
  if(h) document.documentElement.style.setProperty('--above-hud', (Math.ceil(h)+12)+'px')
  // --stage-bottom: the full-width bottom chrome (HUD + COLLAPSED feed drawer) the world
  // must sit above so the beach/ocean stays visible. Always reserve the drawer's COLLAPSED
  // footprint — even when it's expanded — so opening/closing the drawer never resizes the
  // world (its CSS `bottom` offset is unchanged when open; only its height grows).
  const DRAWER_COLLAPSED = 44
  let top = window.innerHeight
  if(hud) top = Math.min(top, hud.getBoundingClientRect().top)
  const chat = document.getElementById('chat-panel')
  if(chat){
    const chatTop = chat.classList.contains('feed-open')
      ? window.innerHeight - (parseFloat(getComputedStyle(chat).bottom)||0) - DRAWER_COLLAPSED
      : chat.getBoundingClientRect().top
    top = Math.min(top, chatTop)
  }
  const sb = Math.max(0, Math.round(window.innerHeight - top))
  if(sb) document.documentElement.style.setProperty('--stage-bottom', sb+'px')
}
window.addEventListener('resize', ()=>{ setHudVar(); if(S && Object.keys(S.chars||{}).length) updateWorld() })

// ── ZOOM-AWARE RE-SYNC (mobile pinch-zoom) ──────────────────────────────────
// Mobile browsers (esp. iOS Safari) let users pinch-zoom even though our viewport asks them
// not to. After a real zoom (scale ≠ 1) the fixed UI + scene layout can be left "stuck", so
// when the SCALE actually changes we re-measure + re-lay-out and clamp the scroll back in.
//
// CRITICAL (the old flicker bug): visualViewport fires 'resize'/'scroll' constantly during a
// normal swipe because the address bar shows/hides — and the old handler ran the FULL
// updateWorld() (re-lays-out the whole scene + every character) on EVERY such event, causing
// a mid-scroll re-layout = flicker/jump. We now ONLY run the heavy updateWorld() when the
// visual-viewport SCALE genuinely changed (a real pinch-zoom). On a plain scroll / address-bar
// resize (scale ~unchanged) we do the cheap work only: refresh the HUD CSS var + clamp scroll.
if (window.visualViewport) {
  const vv = window.visualViewport
  let vvRaf = null
  let lastScale = vv.scale || 1
  const syncViewport = () => {
    vvRaf = null
    const scale = vv.scale || 1
    const scaleChanged = Math.abs(scale - lastScale) > 0.01   // real pinch-zoom only
    lastScale = scale
    setHudVar()
    if (scaleChanged) {
      // Real zoom settled → full re-layout (chars + scene) so nothing is left stuck.
      if (S && Object.keys(S.chars||{}).length) updateWorld()
    }
    // Plain scroll / address-bar resize: NO updateWorld() — just keep the scroll in bounds.
    if (isMobile()) setScrollX(getScrollX())
  }
  const onVV = () => { if (!vvRaf) vvRaf = requestAnimationFrame(syncViewport) }
  vv.addEventListener('resize', onVV)
  vv.addEventListener('scroll', onVV)
}
// Keep --above-hud and --stage-bottom in sync with the HUD's REAL height at all times.
// On mobile the HUD wraps to extra rows (and grows as status text / fonts change), so a
// one-time measure goes stale: the Oracle button (z-index 52) ends up under the HUD
// (z-index 100) and the world stage height drifts. A ResizeObserver re-measures on every
// HUD size change, then re-lays-out the world so characters track the new stage height.
const _hudEl = document.getElementById('hud')
if(_hudEl && window.ResizeObserver){
  new ResizeObserver(()=>{ setHudVar(); if(S && Object.keys(S.chars||{}).length) updateWorld() }).observe(_hudEl)
}

setInterval(updateStatusBar,60000)
init().then(()=>{ initTapStats(); setHudVar() })

// ── AUDIENCE VOTING ("sway, don't script") ──────────────────────────────────
const VOTE_URL='https://wuorljdhcucldqqeqlvy.supabase.co';
const VOTE_KEY='sb_publishable_fUl9AURQ3Mp0OblCKoFkWQ_8qLW-UiA';
const VOTE_WORLD='politicana';
let _vote=null;
function voterId(){let v=localStorage.getItem('trop_voter');if(!v){v='v'+Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem('trop_voter',v);}return v;}
async function loadVote(){ try{_vote=await fetch('data/vote.json?t='+Date.now()).then(r=>r.json());}catch{_vote=null;} renderVote(); }
async function renderVote(){
  const body=document.getElementById('vp-body'); if(!body) return;
  if(!_vote||!_vote.poll){ body.innerHTML='<div style="color:rgba(255,255,255,.5);font-size:12px">No vote open right now — check back soon.</div>'; return; }
  const poll=_vote.poll, opts=poll.options||[];
  const myPick=localStorage.getItem('trop_voted_'+poll.id);
  let tally={};
  try{ const rows=await fetch(VOTE_URL+'/rest/v1/rpc/tally',{method:'POST',headers:{apikey:VOTE_KEY,Authorization:'Bearer '+VOTE_KEY,'Content-Type':'application/json'},body:JSON.stringify({w:VOTE_WORLD,p:poll.id})}).then(r=>r.json()); rows.forEach(r=>tally[r.choice]=r.n); }catch{}
  const total=Object.values(tally).reduce((a,b)=>a+(+b||0),0);
  let html=`<div class="vp-q">${poll.question||'Which way should the yacht lean?'}</div>`;
  opts.forEach(o=>{
    const n=+tally[o.id]||0, pct=total?Math.round(n/total*100):0, picked=myPick===o.id;
    html+=`<button class="vp-opt${picked?' picked':''}" ${myPick?'disabled':''} onclick="castVote('${o.id}')">
      <div class="vp-bar" style="width:${myPick?pct:0}%"></div>
      <div class="vp-opt-label">${o.label}</div><div class="vp-opt-desc">${o.desc||''}</div>
      ${myPick?`<div class="vp-opt-pct">${pct}%</div>`:''}</button>`;
  });
  html+= myPick
    ? `<div class="vp-voted">✓ You leaned toward ${(opts.find(o=>o.id===myPick)||{}).label||myPick} · ${total} ${total===1?'voice':'voices'} so far</div>`
    : `<div class="vp-hint">Tap to cast your one vote — it closes tonight.</div>`;
  const ip=_vote.in_play;
  if(ip) html+=`<div class="vp-inplay">In play now · <b>${ip.label}</b> — ${ip.desc}.${ip.votes?` Chosen by ${ip.votes} ${ip.votes===1?'watcher':'watchers'}.`:''} The yacht leans this way today.</div>`;
  else html+=`<div class="vp-inplay">No lean is in play yet — <b>tonight's vote sets tomorrow's mood.</b></div>`;
  body.innerHTML=html;
}
async function castVote(choice){
  const poll=_vote&&_vote.poll; if(!poll||localStorage.getItem('trop_voted_'+poll.id)) return;
  try{ const res=await fetch(VOTE_URL+'/rest/v1/votes',{method:'POST',headers:{apikey:VOTE_KEY,Authorization:'Bearer '+VOTE_KEY,'Content-Type':'application/json'},body:JSON.stringify({world:VOTE_WORLD,poll_id:poll.id,choice,voter:voterId()})});
    if(res.ok||res.status===409) localStorage.setItem('trop_voted_'+poll.id,choice); }catch{}
  renderVote();
}
function toggleVote(){
  const panel=document.getElementById('vote-panel'), pill=document.getElementById('vote-pill');
  const willOpen=!panel.classList.contains('open');
  // one corner-panel at a time: close the Days dropdown if it's open
  if(willOpen && typeof _dhpOpen!=='undefined' && _dhpOpen){
    _dhpOpen=false; document.getElementById('day-history-panel')?.classList.remove('open');
    document.getElementById('day-hist-btn')?.classList.remove('active');
  }
  panel.classList.toggle('open', willOpen);
  pill.classList.toggle('active', willOpen);
  if(willOpen) loadVote();
}
// tap anywhere outside the dropdown (or the pill) closes it
document.addEventListener('click', e=>{
  const panel=document.getElementById('vote-panel');
  if(panel && panel.classList.contains('open') && !e.target.closest('#vote-panel') && !e.target.closest('#vote-pill')){
    panel.classList.remove('open'); document.getElementById('vote-pill')?.classList.remove('active');
  }
});
loadVote();
